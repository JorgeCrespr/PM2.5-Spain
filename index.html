    <meta charset="utf-8" />
    <title>Calidad del Aire en España</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://unpkg.com/maplibre-gl@4.1.3/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@4.1.3/dist/maplibre-gl.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Georgia, serif; }

        #map {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
        }

        #story {
            position: relative;
            z-index: 10;
            pointer-events: none;
        }

        #header {
            background: rgba(13,27,42,0.92);
            padding: 60px 40px 40px;
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
            pointer-events: all;
            color: #fff;
        }

        #header h1 { font-size: 2.2em; margin-bottom: 10px; color: #fff; }
        #header h2 { font-size: 1.1em; font-weight: normal; color: #aac4e0; margin-bottom: 10px; }
        #header p  { font-size: 0.9em; color: #7a9bbf; }

        .step {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 20px 40px;
            pointer-events: none;
        }

        .step.right { justify-content: flex-end; }
        .step.center { justify-content: center; }

        .step-content {
            background: rgba(13,27,42,0.88);
            padding: 28px 32px;
            max-width: 380px;
            border-left: 5px solid #c0392b;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            pointer-events: all;
            color: #dce8f5;
        }

        .step-content h3 {
            font-size: 1.2em;
            margin-bottom: 12px;
            color: #ffffff;
        }

        .step-content p {
            font-size: 0.95em;
            line-height: 1.6;
            color: #ccdff0;
        }

        .step-content img {
            width: 100%;
            margin-top: 14px;
            border-radius: 4px;
        }

        /* Capítulo final: tarjeta pequeña arriba, mapa libre abajo */
        #step-explora {
            min-height: 150vh;
            align-items: flex-start;
            padding-top: 60px;
        }

        #step-explora .step-content {
            border-left-color: #3498db;
        }

        #footer {
            background: rgba(13,27,42,0.92);
            padding: 30px 40px;
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
            font-size: 0.82em;
            color: #7a9bbf;
            pointer-events: all;
        }

        #spacer { height: 40vh; }

        /* Popup styles */
        .maplibregl-popup-content {
            background: rgba(13,27,42,0.95);
            color: #dce8f5;
            border-radius: 6px;
            padding: 14px 16px;
            font-family: Georgia, serif;
            font-size: 0.9em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .maplibregl-popup-tip { border-top-color: rgba(13,27,42,0.95); }

        .maplibregl-popup-close-button {
            color: #aac4e0;
            font-size: 1.2em;
            padding: 4px 8px;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div id="story">
    <div id="header">
        <h1 id="title"></h1>
        <h2 id="subtitle"></h2>
        <p id="byline"></p>
    </div>
    <div id="chapters"></div>
    <div id="footer"><p id="footer-text"></p></div>
    <div id="spacer"></div>
</div>

<script src="config.js"></script>
<script>
    // ── Populate header ──────────────────────────────────────────
    document.getElementById('title').textContent    = config.title    || '';
    document.getElementById('subtitle').textContent = config.subtitle || '';
    document.getElementById('byline').textContent   = config.byline   || '';
    document.getElementById('footer-text').textContent = config.footer || '';

    // ── Build chapter cards ──────────────────────────────────────
    const container = document.getElementById('chapters');
    config.chapters.forEach(ch => {
        const step = document.createElement('div');
        step.className = 'step ' + (ch.alignment || 'left');
        step.id = 'step-' + ch.id;

        let inner = `<div class="step-content">
            <h3>${ch.title || ''}</h3>
            <p>${ch.description || ''}</p>`;
        if (ch.image) inner += `<img src="${ch.image}" alt="" />`;
        inner += `</div>`;
        step.innerHTML = inner;
        container.appendChild(step);
    });

    // ── Init map ─────────────────────────────────────────────────
    const map = new maplibregl.Map({
        container: 'map',
        style: config.style,
        center: config.chapters[0].location.center,
        zoom:   config.chapters[0].location.zoom,
        pitch:  config.chapters[0].location.pitch  || 0,
        bearing:config.chapters[0].location.bearing|| 0
    });

    map.addControl(new maplibregl.NavigationControl(), 'top-right');

    // ── Scroll logic ─────────────────────────────────────────────
    let activeChapterIdx = -1;

    function setChapter(idx) {
        if (idx === activeChapterIdx) return;

        const ch = config.chapters[idx];

        map[ch.mapAnimation || 'flyTo']({
            center:  ch.location.center,
            zoom:    ch.location.zoom,
            pitch:   ch.location.pitch   || 0,
            bearing: ch.location.bearing || 0,
            duration: 2000
        });

        map.once('idle', () => {
            if (activeChapterIdx >= 0) {
                (config.chapters[activeChapterIdx].onChapterExit || []).forEach(l => {
                    if (map.getLayer(l.layer)) {
                        const prop = map.getLayer(l.layer).type === 'fill'
                            ? 'fill-opacity' : 'circle-opacity';
                        map.setPaintProperty(l.layer, prop, l.opacity);
                    }
                });
            }
            (ch.onChapterEnter || []).forEach(l => {
                if (map.getLayer(l.layer)) {
                    const prop = map.getLayer(l.layer).type === 'fill'
                        ? 'fill-opacity' : 'circle-opacity';
                    map.setPaintProperty(l.layer, prop, l.opacity);
                }
            });
        });

        activeChapterIdx = idx;
    }

    window.addEventListener('scroll', () => {
        const scrollMid = window.scrollY + window.innerHeight / 2;
        config.chapters.forEach((ch, i) => {
            const el = document.getElementById('step-' + ch.id);
            if (!el) return;
            const top = el.getBoundingClientRect().top + window.scrollY;
            const bot = top + el.offsetHeight;
            if (scrollMid >= top && scrollMid < bot) setChapter(i);
        });
    });

    // ── Popups ────────────────────────────────────────────────────
    const popup = new maplibregl.Popup({
        closeButton: true,
        closeOnClick: false,
        maxWidth: '220px'
    });

    // Click en provincias (coropletas)
    map.on('click', 'pm25-fill', (e) => {
        const props = e.features[0].properties;
        const nombre = props.NAME_2 || 'Provincia';
        const valor = props.PM25_media !== null ? props.PM25_media + ' µg/m³' : 'Sin datos';
        const estaciones = props.num_estaciones || '—';

        popup.setLngLat(e.lngLat)
            .setHTML(`
                <strong>${nombre}</strong><br>
                PM2.5 media: <strong>${valor}</strong><br>
                <span style="font-size:0.85em;color:#7a9bbf">${estaciones} estaciones medidas</span>
            `)
            .addTo(map);
    });

    // Click en puntos de estaciones
    map.on('click', 'pm25-puntos', (e) => {
        const props = e.features[0].properties;
        const nombre = props.nombre || 'Estación';
        const valor = props.PM25_media !== null ? props.PM25_media + ' µg/m³' : 'Sin datos';
        const calidad = props.calidad || '—';

        popup.setLngLat(e.lngLat)
            .setHTML(`
                <strong>${nombre}</strong><br>
                PM2.5: <strong>${valor}</strong><br>
                Calidad: <strong style="color:${
                    calidad === 'Buena' ? '#27ae60' :
                    calidad === 'Moderada' ? '#f39c12' :
                    calidad === 'Mala' ? '#e67e22' : '#c0392b'
                }">${calidad}</strong>
            `)
            .addTo(map);
    });

    // Click en top5 peores
    map.on('click', 'top5-peores', (e) => {
        const props = e.features[0].properties;
        popup.setLngLat(e.lngLat)
            .setHTML(`
                <strong>🔴 ${props.nombre}</strong><br>
                PM2.5: <strong>${props.PM25_media} µg/m³</strong><br>
                <span style="font-size:0.85em;color:#c0392b">Top 5 más contaminadas</span>
            `)
            .addTo(map);
    });

    // Click en top5 mejores
    map.on('click', 'top5-mejores', (e) => {
        const props = e.features[0].properties;
        popup.setLngLat(e.lngLat)
            .setHTML(`
                <strong>🟢 ${props.nombre}</strong><br>
                PM2.5: <strong>${props.PM25_media} µg/m³</strong><br>
                <span style="font-size:0.85em;color:#27ae60">Top 5 más limpias</span>
            `)
            .addTo(map);
    });

    // Cambiar cursor al pasar por encima
    ['pm25-fill', 'pm25-puntos', 'top5-peores', 'top5-mejores'].forEach(layer => {
        map.on('mouseenter', layer, () => map.getCanvas().style.cursor = 'pointer');
        map.on('mouseleave', layer, () => map.getCanvas().style.cursor = '');
    });
</script>
</body>
</html>
